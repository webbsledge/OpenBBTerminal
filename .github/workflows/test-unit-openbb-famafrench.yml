name: 🧪 test openbb-famafrench

# PR-test for the Fama-French provider. Triggers when a PR touches any file
# under ``openbb_platform/providers/famafrench/`` or this workflow itself.
#
# Build-once, test-many: a single ``build`` job produces the wheel + sdist;
# the ``lint`` and ``test`` jobs install the provider editable from source
# (``[tool.uv.sources]`` pins openbb-core to the sibling tree, since
# openbb-core>=2.0.0 is not yet on PyPI) and run across every supported
# (OS, Python) combination. The provider has no build-time assets, so the
# test suite replays entirely from VCR cassettes — no network in CI.

on:
  pull_request:
    branches: [develop, main, v5, feature/v5-platform-api]
    paths:
      - "openbb_platform/providers/famafrench/**"
      - ".github/workflows/test-unit-openbb-famafrench.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel in-flight matrix runs when a new commit lands on the same PR.
  group: test-openbb-famafrench-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/providers/famafrench
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip uv

      - name: Build sdist + wheel
        run: uv build --no-sources

      - uses: actions/upload-artifact@v4
        with:
          name: openbb-famafrench-dist
          path: openbb_platform/providers/famafrench/dist/
          if-no-files-found: error
          retention-days: 7

  lint:
    name: Lint (ruff + ty)
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/providers/famafrench
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip uv

      - name: Install openbb-famafrench in editable mode (+ dev group)
        # ``-e .`` reads ``[tool.uv.sources]`` and resolves openbb-core /
        # openbb-devtools from the sibling source trees. ``--group dev``
        # pulls in ruff, ty, pytest, pytest-cov, pytest-recorder, etc.
        run: |
          uv pip install --system -e .
          uv pip install --system --group dev

      - name: ruff check
        run: ruff check openbb_famafrench tests integration

      - name: ruff format --check
        run: ruff format --check openbb_famafrench tests integration

      - name: ty check
        run: ty check openbb_famafrench

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python_version }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: full sweep across every released Python.
          - { os: ubuntu-latest, python_version: "3.10" }
          - { os: ubuntu-latest, python_version: "3.11" }
          - { os: ubuntu-latest, python_version: "3.12" }
          - { os: ubuntu-latest, python_version: "3.13" }
          - { os: ubuntu-latest, python_version: "3.14" }
          - { os: ubuntu-latest, python_version: "3.15" }
          # macOS + Windows: min and max supported.
          - { os: macos-latest, python_version: "3.10" }
          - { os: macos-latest, python_version: "3.15" }
          - { os: windows-latest, python_version: "3.10" }
          - { os: windows-latest, python_version: "3.14" }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/providers/famafrench
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}
          allow-prereleases: true

      - run: python -m pip install --upgrade pip uv

      - name: Install openbb-famafrench from source (+ dev group)
        run: |
          uv pip install --system -e .
          uv pip install --system --group dev

      - name: Run unit tests
        run: pytest tests --cov=openbb_famafrench --cov-report=term-missing --cov-fail-under=100
