name: 📦 publish openbb-agent-server

# Triggers exclusively on the merge of a ``release/openbb-agent-server-v*``
# branch into ``develop``. No push / tag triggers. Four sequential
# jobs — verify the version bump, build once, test the source the
# wheel was built from across the cross-platform matrix, and only
# publish to PyPI if the entire matrix is green.

on:
  pull_request:
    types: [closed]
    branches: [develop, v5]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-check:
    name: Verify version bump
    if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/openbb-agent-server-v')) || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/extensions/agent_server
    steps:
      - uses: actions/checkout@v6
        with:
          ref: develop

      - name: Parse [project].version from pyproject.toml
        id: parse
        run: |
          VERSION=$(grep -m1 -E '^version[[:space:]]*=' pyproject.toml | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse [project].version from pyproject.toml."
            exit 1
          fi
          echo "Local version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fail if version already exists on PyPI
        env:
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/openbb-agent-server/${VERSION}/json")
          case "$STATUS" in
            200)
              echo "::error::openbb-agent-server ${VERSION} is already published on PyPI."
              echo "Bump openbb_platform/extensions/agent_server/pyproject.toml [project].version and re-merge a fresh release branch."
              exit 1
              ;;
            404)
              echo "openbb-agent-server ${VERSION} is not yet on PyPI — proceeding."
              ;;
            *)
              echo "::error::Unexpected status $STATUS from PyPI JSON API. Aborting to avoid a silent skip."
              exit 1
              ;;
          esac

      - name: Verify release branch name matches pyproject version
        if: github.event_name == 'pull_request'
        env:
          VERSION: ${{ steps.parse.outputs.version }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          EXPECTED="release/openbb-agent-server-v${VERSION}"
          if [ "$BRANCH" != "$EXPECTED" ]; then
            echo "::error::Release branch '${BRANCH}' does not match pyproject version '${VERSION}'."
            echo "Expected branch name: '${EXPECTED}'."
            echo "Either rename the release branch or update [project].version in pyproject.toml so they agree."
            exit 1
          fi
          echo "Branch '${BRANCH}' matches pyproject version '${VERSION}'."

  build:
    name: Build sdist + wheel
    needs: version-check
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/extensions/agent_server
    steps:
      - uses: actions/checkout@v6
        with:
          ref: develop

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip uv

      - name: Build sdist + wheel
        # ``--no-sources`` ignores ``[tool.uv.sources]`` so the
        # published artifact carries the public dependency pins
        # (``openbb-core>=2.0.0``) rather than sibling-tree paths.
        run: uv build --no-sources

      - uses: actions/upload-artifact@v4
        with:
          name: openbb-agent-server-dist
          path: openbb_platform/extensions/agent_server/dist/
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python_version }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: full sweep across the supported Python range.
          # 3.14+ is intentionally excluded — the langchain / langgraph
          # / deepagents stack does not yet publish wheels for it.
          - { os: ubuntu-latest, python_version: "3.10" }
          - { os: ubuntu-latest, python_version: "3.11" }
          - { os: ubuntu-latest, python_version: "3.12" }
          - { os: ubuntu-latest, python_version: "3.13" }
          # macOS + Windows: min and max supported.
          - { os: macos-latest, python_version: "3.10" }
          - { os: macos-latest, python_version: "3.13" }
          - { os: windows-latest, python_version: "3.10" }
          - { os: windows-latest, python_version: "3.13" }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/extensions/agent_server
    steps:
      - uses: actions/checkout@v6
        with:
          ref: develop

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - run: python -m pip install --upgrade pip uv

      - name: Install openbb-agent-server from source (+ dev group)
        # Source install via ``-e .`` reads ``[tool.uv.sources]`` and
        # resolves ``openbb-core`` from the sibling tree at
        # ``../../core``. Installing the wheel directly would fail
        # dependency resolution until ``openbb-core>=2.0.0`` ships to
        # PyPI; the wheel is still the artifact published by the
        # ``publish`` job — this matrix validates the source the wheel
        # was built from. ``--group dev`` installs ``openbb-devtools``,
        # which bundles pytest, pytest-asyncio, pytest-cov, and httpx.
        run: |
          uv pip install --system -e .
          uv pip install --system --group dev

      - name: Run unit tests
        run: pytest tests --cov=openbb_agent_server --cov-report=term-missing

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for PyPI OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: openbb-agent-server-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
