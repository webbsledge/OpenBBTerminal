name: 🧪 test openbb-agent-server

# PR-test for the agent-server extension. Triggers when a PR touches
# any file under ``openbb_platform/extensions/agent_server/`` or this
# workflow itself.
#
# Three independent jobs run in parallel — there is no build-time data
# generation (unlike the OECD provider), so the wheel build, the lint
# pass, and the cross-platform test matrix each install from source
# and need no shared artifact.

on:
  pull_request:
    branches: [develop, main, v5, feature/v5-platform-api]
    paths:
      - "openbb_platform/extensions/agent_server/**"
      - ".github/workflows/test-unit-openbb-agent-server.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel in-flight matrix runs when a new commit lands on the same PR.
  group: test-openbb-agent-server-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/extensions/agent_server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip uv

      - name: Build sdist + wheel
        # ``--no-sources`` ignores ``[tool.uv.sources]`` so the wheel
        # carries the published dependency pins (``openbb-core>=2.0.0``)
        # rather than the sibling-tree editable paths. This job exists
        # to catch packaging breakage on PRs; the artifact is not fed
        # to the test matrix (those jobs install from source).
        run: uv build --no-sources

      - uses: actions/upload-artifact@v4
        with:
          name: openbb-agent-server-dist
          path: openbb_platform/extensions/agent_server/dist/
          if-no-files-found: error
          retention-days: 7

  lint:
    name: Lint (ruff + ty)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/extensions/agent_server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip uv

      - name: Install openbb-agent-server in editable mode (+ dev group)
        # ``-e .`` reads ``[tool.uv.sources]`` and resolves
        # ``openbb-core`` / ``openbb-devtools`` from the sibling source
        # trees, so ty sees the exact types about to ship together
        # rather than whatever is on PyPI. ``--group dev`` pulls in
        # ``openbb-devtools`` (ruff, ty, pytest-asyncio, …) so lint
        # tooling versions stay pinned in one place.
        run: |
          uv pip install --system -e .
          uv pip install --system --group dev

      - name: ruff check
        run: ruff check openbb_agent_server tests

      - name: ruff format --check
        run: ruff format --check openbb_agent_server tests

      - name: ty check
        run: ty check openbb_agent_server

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python_version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: full sweep across the supported Python range.
          # 3.14+ is intentionally excluded — the langchain / langgraph
          # / deepagents stack does not yet publish wheels for it.
          - { os: ubuntu-latest, python_version: "3.10" }
          - { os: ubuntu-latest, python_version: "3.11" }
          - { os: ubuntu-latest, python_version: "3.12" }
          - { os: ubuntu-latest, python_version: "3.13" }
          # macOS + Windows: min and max supported.
          - { os: macos-latest, python_version: "3.10" }
          - { os: macos-latest, python_version: "3.13" }
          - { os: windows-latest, python_version: "3.10" }
          - { os: windows-latest, python_version: "3.13" }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/extensions/agent_server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - run: python -m pip install --upgrade pip uv

      - name: Install openbb-agent-server from source (+ dev group)
        # Source install via ``-e .`` reads ``[tool.uv.sources]`` and
        # resolves ``openbb-core`` from the sibling tree at
        # ``../../core`` — the only place ``openbb-core>=2.0.0`` exists
        # until that version ships to PyPI. ``--group dev`` installs
        # ``openbb-devtools``, which bundles pytest, pytest-asyncio,
        # pytest-cov, and httpx — the single pinned source of
        # test-tool versions.
        run: |
          uv pip install --system -e .
          uv pip install --system --group dev

      - name: Run unit tests
        run: pytest tests --cov=openbb_agent_server --cov-report=term-missing --cov-fail-under=100
