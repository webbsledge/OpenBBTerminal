name: 🧪 test openbb-agent-server

# PR-test for the agent-server extension. Triggers when a PR touches
# any file under ``openbb_platform/extensions/agent_server/`` or this
# workflow itself.
#
# Three independent jobs run in parallel — there is no build-time data
# generation (unlike the OECD provider), so the wheel build, the lint
# pass, and the cross-platform test matrix each install from source
# and need no shared artifact.

on:
  pull_request:
    branches: [develop, v5]
    paths:
      - "openbb_platform/extensions/agent_server/**"
      - ".github/workflows/test-unit-openbb-agent-server.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel in-flight matrix runs when a new commit lands on the same PR.
  group: test-openbb-agent-server-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/extensions/agent_server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip uv

      - name: Build sdist + wheel
        run: uv build --no-sources
      - uses: actions/upload-artifact@v4
        with:
          name: openbb-agent-server-dist
          path: openbb_platform/extensions/agent_server/dist/
          if-no-files-found: error
          retention-days: 7

  lint:
    name: Lint (ruff + ty)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/extensions/agent_server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip uv

      - name: Install openbb-agent-server in editable mode (+ dev group)
        run: |
          uv pip install --system -e .
          uv pip install --system --group dev

      - name: ruff check
        run: ruff check openbb_agent_server tests

      - name: ruff format --check
        run: ruff format --check openbb_agent_server tests

      - name: ty check
        run: ty check openbb_agent_server

  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python_version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python_version: "3.11" }
          - { os: ubuntu-latest, python_version: "3.12" }
          - { os: ubuntu-latest, python_version: "3.13" }
          - { os: ubuntu-latest, python_version: "3.14" }
          # macOS + Windows: min and max supported.
          - { os: macos-latest, python_version: "3.11" }
          - { os: macos-latest, python_version: "3.13" }
          - { os: windows-latest, python_version: "3.11" }
          - { os: windows-latest, python_version: "3.13" }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: openbb_platform/extensions/agent_server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - run: python -m pip install --upgrade pip uv

      - name: Install openbb-agent-server from source (+ dev group)
        run: |
          uv pip install --system -e .
          uv pip install --system --group dev

      - name: Run unit tests
        run: pytest tests --cov=openbb_agent_server --cov-report=term-missing --cov-fail-under=100
