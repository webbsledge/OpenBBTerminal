name: 🤖 openbb-mcp-server

on:
  # ``pull_request`` covers the PR lifecycle and ``merge_group`` covers
  # the merge-queue gate. No ``push`` trigger — that would re-run the
  # full matrix on the post-merge commit even though ``merge_group``
  # already validated the same SHA.
  pull_request:
    branches:
      - develop
      - v5
      - feature/cli-2
    paths:
      - 'openbb_platform/extensions/mcp_server/**'
      - 'openbb_platform/core/**'
      - 'openbb_platform/extensions/devtools/**'
      - 'cli/**'
      - '.github/workflows/test-unit-mcp-server.yml'
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: openbb_platform/extensions/mcp_server

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python_version }})
    runs-on: ${{ matrix.os }}
    env:
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: full sweep across every supported Python.
          - { os: ubuntu-latest, python_version: "3.10" }
          - { os: ubuntu-latest, python_version: "3.11" }
          - { os: ubuntu-latest, python_version: "3.12" }
          - { os: ubuntu-latest, python_version: "3.13" }
          - { os: ubuntu-latest, python_version: "3.14" }
          - { os: ubuntu-latest, python_version: "3.15" }
          # macOS and Windows: min and max supported.
          - { os: macos-latest, python_version: "3.10" }
          - { os: macos-latest, python_version: "3.15" }
          - { os: windows-latest, python_version: "3.10" }
          - { os: windows-latest, python_version: "3.14" }
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Python ${{ matrix.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}
          allow-prereleases: true
          cache: "pip"

      - name: Cache uv (built wheels)
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.uv-cache
          key: uv-${{ runner.os }}-py${{ matrix.python_version }}-${{ hashFiles('openbb_platform/extensions/mcp_server/pyproject.toml', 'openbb_platform/extensions/mcp_server/uv.lock', 'openbb_platform/core/pyproject.toml', 'openbb_platform/extensions/devtools/pyproject.toml', 'cli/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py${{ matrix.python_version }}-

      - name: Install openbb-mcp-server
        # ``--group dev`` pulls in openbb-devtools (pytest, pytest-cov,
        # pytest-asyncio, etc.) AND openbb-cli (so the cli_tools tests
        # exercise real LocalDispatcher / HttpDispatcher singletons).
        # ``[tool.uv.sources]`` in pyproject.toml resolves
        # ``openbb-core`` / ``openbb-cli`` / ``openbb-devtools`` to the
        # local checkout so unreleased v5 changes are picked up.
        #
        # Pre-build ``pydantic-core`` BEFORE setting
        # ``PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1``. pydantic-core
        # 2.46.4 (no cp315 wheels yet) builds from source on 3.15 just
        # fine because its pyo3 0.28 supports 3.15 natively — but only
        # when the abi3 flag is NOT set. With the flag, pyo3 force-
        # enables ``Py_LIMITED_API`` and gates out the non-abi3
        # datetime types pydantic-core uses unconditionally
        # (``PyDateAccess``/``PyTimeAccess``/``PyDeltaAccess``/...).
        #
        # The flag IS needed for the second install so ``watchfiles``
        # (pyo3 0.26) and ``rpds-py`` (pyo3 0.27) — fastmcp transitives
        # whose old pyo3 doesn't recognize 3.15 — can build via the
        # documented stable-ABI forward-compat escape hatch.
        # pydantic-core is already satisfied so uv skips it.
        run: |
          python -m pip install --upgrade pip uv
          python -m uv pip install --system pydantic
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 \
            python -m uv pip install --system -e . --group dev

      - name: Patch beartype for Python 3.15
        # ``beartype`` 0.22.9 (latest, transitively pulled by
        # ``fastmcp -> key_value``) has two 3.15 incompatibilities:
        #
        # 1. Imports ``typing.no_type_check_decorator``, which 3.15
        #    removed per its deprecation cycle. We re-add it via a
        #    ``sitecustomize.py`` shim that runs at Python startup.
        # 2. ``BeartypeSourceFileLoader.source_to_code`` overrides the
        #    stdlib method with the old 3-arg signature; 3.15 added a
        #    4th positional ``_optimize`` parameter, so every import
        #    routed through beartype's claw hook fails. Rewrite the
        #    override in-place to swallow extra args.
        #
        # Upstream beartype hasn't released a 3.15-aware version yet.
        if: matrix.python_version == '3.15'
        working-directory: ${{ github.workspace }}
        run: |
          python <<'PY'
          import importlib.util, pathlib, sysconfig

          # 1. typing shim via sitecustomize
          purelib = pathlib.Path(sysconfig.get_paths()["purelib"])
          shim = (
              "import typing\n"
              "if not hasattr(typing, 'no_type_check_decorator'):\n"
              "    def no_type_check_decorator(decorator):\n"
              "        return decorator\n"
              "    typing.no_type_check_decorator = no_type_check_decorator\n"
          )
          (purelib / "sitecustomize.py").write_text(shim)

          # 2. SourceFileLoader signature patch
          spec = importlib.util.find_spec("beartype.claw._importlib._clawimpload")
          p = pathlib.Path(spec.origin)
          src = p.read_text()
          new = src.replace(
              "def source_to_code(self, data, path):",
              "def source_to_code(self, data, path, *_args, **_kwargs):",
          )
          if new == src:
              raise SystemExit("beartype source_to_code signature not found")
          p.write_text(new)
          PY

      - name: Run unit tests
        run: |
          python -m pytest tests \
            --cov=openbb_mcp_server \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml

      - name: Upload unit-test coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openbb-mcp-server-coverage-unit-${{ matrix.os }}-py${{ matrix.python_version }}
          path: openbb_platform/extensions/mcp_server/coverage-unit.xml
