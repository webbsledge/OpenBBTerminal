name: ūü§Ė openbb-mcp-server

on:
  # ``pull_request`` covers the PR lifecycle and ``merge_group`` covers
  # the merge-queue gate. No ``push`` trigger ‚ÄĒ that would re-run the
  # full matrix on the post-merge commit even though ``merge_group``
  # already validated the same SHA.
  pull_request:
    branches:
      - develop
      - v5
      - feature/cli-2
    paths:
      - 'openbb_platform/extensions/mcp_server/**'
      - 'openbb_platform/core/**'
      - 'openbb_platform/extensions/devtools/**'
      - 'cli/**'
      - '.github/workflows/test-unit-mcp-server.yml'
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: openbb_platform/extensions/mcp_server

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python_version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: full sweep across every supported Python.
          - { os: ubuntu-latest, python_version: "3.10" }
          - { os: ubuntu-latest, python_version: "3.11" }
          - { os: ubuntu-latest, python_version: "3.12" }
          - { os: ubuntu-latest, python_version: "3.13" }
          - { os: ubuntu-latest, python_version: "3.14" }
          - { os: ubuntu-latest, python_version: "3.15" }
          # macOS and Windows: min and max supported.
          - { os: macos-latest, python_version: "3.10" }
          - { os: macos-latest, python_version: "3.15" }
          - { os: windows-latest, python_version: "3.10" }
          - { os: windows-latest, python_version: "3.14" }
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Python ${{ matrix.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}
          allow-prereleases: true
          cache: "pip"

      - name: Install dependencies
        # ``openbb-core``, ``openbb-cli``, and ``openbb-devtools`` all
        # pin a ``>=2.0.0`` floor that isn't on PyPI yet (max published
        # openbb-core is 1.6.9). Resolver hits PyPI for those siblings
        # first, fails, and backs out the install. Workaround:
        #
        # 1. Install ``openbb-core[pandas]`` editable so the local
        #    2.0.0 wheel is registered with pip's resolver.
        # 2. Install every transitive PyPI dep of openbb-cli /
        #    openbb-mcp-server / openbb-devtools so they're satisfied
        #    when the editable wheels go in with ``--no-deps``.
        # 3. Install the v5 siblings + the package under test with
        #    ``--no-deps`` ‚ÄĒ pip only checks ``Requires-Python`` and
        #    skips dependency resolution.
        #
        # ``defaults.run.working-directory`` is scoped to the mcp-server
        # folder; this step overrides to the workspace root so the
        # sibling paths resolve.
        working-directory: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          # 1. Editable openbb-core (with pandas extra) ‚ÄĒ provides the
          # local 2.0.0 wheel.
          pip install -e "./openbb_platform/core[pandas]"
          # 2. Transitive PyPI deps for cli, mcp-server, and the dev
          # toolchain. Pinned to the same floors as each pyproject.
          pip install \
            "fastmcp>=3.2.0" \
            "httpx>=0.28.0,<1.0.0" \
            "prompt-toolkit>=3.0.50,<4.0.0" \
            "rich>=14.0.0,<15.0.0" \
            "python-dotenv>=1.0.1,<2.0.0" \
            "openpyxl>=3.1.5,<4.0.0" \
            "pyyaml>=6.0" \
            "pytest>=9.0.3" \
            "pytest-asyncio>=1.3.0,<2.0.0" \
            "pytest-cov>=4.1.0,<5.0.0" \
            "pytest-subtests>=0.11.0,<1.0.0" \
            "pytest-recorder>=0.6.5" \
            "tomli; python_version<'3.11'"
          # 3. Editable v5 siblings + the package under test, all
          # ``--no-deps`` so pip stays away from PyPI's stale 1.x line.
          pip install -e ./cli --no-deps
          pip install -e ./openbb_platform/extensions/devtools --no-deps
          pip install -e ./openbb_platform/extensions/mcp_server --no-deps

      - name: Run unit tests
        run: |
          python -m pytest tests \
            --cov=openbb_mcp_server \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml

      - name: Upload unit-test coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openbb-mcp-server-coverage-unit-${{ matrix.os }}-py${{ matrix.python_version }}
          path: openbb_platform/extensions/mcp_server/coverage-unit.xml
