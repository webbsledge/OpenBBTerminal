name: 🧹 General Linting

env:
  PIP_DEFAULT_TIMEOUT: 100

on:
  pull_request:
    types: [opened, synchronize, edited]
    paths:
      - 'openbb_platform/**'
      - '.github/workflows/general-linting.yml'
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.event_name }}-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-linting:
    name: General Code Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 # actions/checkout v3.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 20
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch base branch
        run: git fetch --no-tags --depth=20 origin ${{ github.base_ref }}

      - name: Setup Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          architecture: x64

      - name: Get changed files in openbb_platform for PR
        if: github.event_name == 'pull_request'
        run: |
          # "Checking PR diff"
          echo "diff_files=$(git diff --diff-filter=d --name-only origin/${{ github.base_ref }}...${HEAD_REF} | grep -E '^openbb_platform/.*\.py$' | grep -v 'openbb_platform/core/openbb/package' | grep -v 'integration' | grep -v 'tests' | xargs)" >> $GITHUB_ENV
          echo $diff_files

        env:
          HEAD_REF: ${{ github.head_ref }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-linting-${{ hashFiles('**/poetry.lock') }}
          restore-keys: ${{ runner.os }}-linting-${{ hashFiles('**/poetry.lock') }}

      - run: |
          pip install ./openbb_platform/extensions/devtools
      - name: Install openbb-core (so ty can resolve runtime deps)
        run: pip install -e "./openbb_platform/core[pandas]" numpy
      - name: Install openbb-platform-api (so ty can resolve deepdiff/aiohttp)
        # Install runtime deps directly, then editable platform-api with
        # ``--no-deps``. Going through pip's resolver against the editable
        # local openbb-core@2.0.0 fails because pip re-checks PyPI for
        # ``openbb-core>=2.0.0`` (max published is 1.6.9). The ``--no-deps``
        # form skips that resolution since every dep is either pre-installed
        # (openbb-core editable) or installed in this same step.
        run: |
          pip install "deepdiff>=8.6.2" "aiohttp" "tomli; python_version<'3.11'"
          pip install -e ./openbb_platform/extensions/platform_api --no-deps
      - name: Install openbb-mcp-server (so ty can resolve fastmcp)
        # Same pattern as platform-api — install fastmcp first, then the
        # editable package with ``--no-deps`` so pip doesn't backtrack
        # through fastmcp's transitive constraints and lose track of the
        # already-installed editable openbb-core@2.0.0.
        run: |
          pip install "fastmcp>=3.2.0" "tomli; python_version<'3.11'"
          pip install -e ./openbb_platform/extensions/mcp_server --no-deps
      - run: codespell --ignore-words=.codespell.ignore --skip="$(tr '\n' ',' < .codespell.skip | sed 's/,$//')" --quiet-level=2
      - run: |
          # Run linters for openbb_platform
          if [ -n "${{ env.diff_files }}" ]; then
            ruff format --check ${{ env.diff_files }}
            ruff check ${{ env.diff_files }}
            ty check ${{ env.diff_files }}
          else
            echo "No Python files changed in openbb_platform"
          fi

  markdown-link-check:
    name: Markdown Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        name: Check out the code
      - name: Lint Code Base
        uses: docker://avtodev/markdown-lint:v1
        with:
          args: "./*.md ./changelogs/*.md ./openbb_terminal/**/*.md ./discordbot/**/*.md"

  json-yaml-validate:
    name: JSON Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: json-yaml-validate
        id: json-yaml-validate
        uses: GrantBirki/json-yaml-validate@9bbaa8474e3af4e91f25eda8ac194fdc30564d96 # v4
        with:
          yaml_exclude_regex: "construct.yaml"
          use_gitignore: false
